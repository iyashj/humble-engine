name: C++ Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_USER_HOME: "${{ github.workspace }}"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} - ${{ matrix.build_type }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libasound2-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py', 'conandata.yml') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.build_type }}-
            conan-${{ runner.os }}-

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Conan install (deps)
        run: |
          conan install . \
            --build=missing \
            -s build_type=${{ matrix.build_type }} \
            -o "&:build_tests=True" \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Configure CMake (preset)
        shell: bash
        run: |
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            cmake --preset debug
          else
            cmake --preset default
          fi

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            cmake --build --preset debug --parallel
          else
            cmake --build --preset default --parallel
          fi

      - name: Run tests
        run: |
          ctest --test-dir build/${{ matrix.build_type }} --output-on-failure --parallel

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/Testing/
            build/${{ matrix.build_type }}/**/test-results/
          retention-days: 14

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/CMakeFiles/*.log
            build/${{ matrix.build_type }}/**/*.log
            ~/.conan2/logs/
          retention-days: 14