name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CONAN_USER_HOME: "${{ github.workspace }}"

jobs:
  build-test:
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        include:
          # Linux builds
          - os: ubuntu-22.04
            build_type: Debug
            compiler: gcc-11
            conan_profile: linux-gcc11
          - os: ubuntu-22.04
            build_type: Release
            compiler: gcc-11
            conan_profile: linux-gcc11
          - os: ubuntu-22.04
            build_type: Debug
            compiler: clang-14
            conan_profile: linux-clang14
          - os: ubuntu-22.04
            build_type: Release
            compiler: clang-14
            conan_profile: linux-clang14

          # Windows builds
          - os: windows-2022
            build_type: Debug
            compiler: msvc193
            conan_profile: windows-msvc193
          - os: windows-2022
            build_type: Release
            compiler: msvc193
            conan_profile: windows-msvc193

          # macOS builds
          - os: macos-13
            build_type: Debug
            compiler: clang-15
            conan_profile: macos-clang15
          - os: macos-13
            build_type: Release
            compiler: clang-15
            conan_profile: macos-clang15

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.build_type }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup GCC (Linux)
        if: runner.os == 'Linux' && contains(matrix.compiler, 'gcc')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11 g++-11
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

      - name: Setup Clang (Linux)
        if: runner.os == 'Linux' && contains(matrix.compiler, 'clang')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-14 libc++-14-dev libc++abi-14-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-14 100

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libasound2-dev \
            pkg-config \
            ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('conanfile.py', 'conandata.yml') }}
          restore-keys: |
            conan-${{ matrix.os }}-${{ matrix.compiler }}-
            conan-${{ matrix.os }}-

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Configure Conan profile
        run: |
          conan profile detect --force
          conan profile show default

      - name: Create custom Conan profile (Linux GCC)
        if: runner.os == 'Linux' && contains(matrix.compiler, 'gcc')
        run: |
          conan profile detect --force --name ${{ matrix.conan_profile }}
          conan profile update settings.compiler=gcc ${{ matrix.conan_profile }}
          conan profile update settings.compiler.version=11 ${{ matrix.conan_profile }}
          conan profile update settings.compiler.libcxx=libstdc++11 ${{ matrix.conan_profile }}
          conan profile update settings.compiler.cppstd=17 ${{ matrix.conan_profile }}

      - name: Create custom Conan profile (Linux Clang)
        if: runner.os == 'Linux' && contains(matrix.compiler, 'clang')
        run: |
          conan profile detect --force --name ${{ matrix.conan_profile }}
          conan profile update settings.compiler=clang ${{ matrix.conan_profile }}
          conan profile update settings.compiler.version=14 ${{ matrix.conan_profile }}
          conan profile update settings.compiler.libcxx=libc++ ${{ matrix.conan_profile }}
          conan profile update settings.compiler.cppstd=17 ${{ matrix.conan_profile }}

      - name: Create custom Conan profile (Windows)
        if: runner.os == 'Windows'
        run: |
          conan profile detect --force --name ${{ matrix.conan_profile }}
          conan profile update settings.compiler.cppstd=17 ${{ matrix.conan_profile }}

      - name: Create custom Conan profile (macOS)
        if: runner.os == 'macOS'
        run: |
          conan profile detect --force --name ${{ matrix.conan_profile }}
          conan profile update settings.compiler.cppstd=17 ${{ matrix.conan_profile }}

      - name: Install dependencies
        run: |
          conan install . \
            --profile:host=${{ matrix.conan_profile }} \
            --profile:build=default \
            --build=missing \
            --settings:host=build_type=${{ matrix.build_type }} \
            --options="&:build_tests=True" \
            --conf="tools.cmake.cmaketoolchain:generator=Ninja" \
            --conf="tools.system.package_manager:mode=install" \
            --conf="tools.system.package_manager:sudo=True"

      - name: List generated files (Debug)
        run: |
          find . -name "CMakePresets.json" -exec cat {} \; || echo "No CMakePresets.json found"
          ls -la build/ || echo "No build directory"

      - name: Configure CMake
        run: |
          cmake --preset conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Build project
        run: |
          cmake --build build/${{ matrix.build_type }} --config ${{ matrix.build_type }} --parallel

      - name: Run tests
        working-directory: build/${{ matrix.build_type }}
        run: |
          ctest --output-on-failure --verbose --parallel --build-config ${{ matrix.build_type }}

      - name: Generate coverage report (Debug Linux only)
        if: matrix.build_type == 'Debug' && runner.os == 'Linux' && contains(matrix.compiler, 'gcc')
        run: |
          sudo apt-get install -y lcov
          lcov --directory . --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov (Debug Linux only)
        if: matrix.build_type == 'Debug' && runner.os == 'Linux' && contains(matrix.compiler, 'gcc')
        uses: codecov/codecov-action@v4
        with:
          file: coverage.info
          fail_ci_if_error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/*.exe
            build/${{ matrix.build_type }}/**/test_*
            build/${{ matrix.build_type }}/**/*.so
            build/${{ matrix.build_type }}/**/*.dylib
            build/${{ matrix.build_type }}/**/*.dll
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/Testing/
            build/${{ matrix.build_type }}/**/test-results/
          retention-days: 14

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: logs-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/CMakeFiles/*.log
            build/${{ matrix.build_type }}/**/*.log
            ~/.conan2/logs/
          retention-days: 14